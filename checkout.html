<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Checkout | AF Wealth Mindset</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "midnight": "#0B1220",
          "ivory": "#F6F1E7",
          "gold": "#D7B46A",
          "signature-teal": "#1FE6D1"
        },
        fontFamily: {
          "display": ["Manrope", "sans-serif"]
        }
      }
    }
  }
</script>
<style>
  body { background: #0B1220; }
  input { background: #F6F1E7 !important; color: #0B1220 !important; padding: 10px 12px !important; }
  input::placeholder { color: rgba(11, 18, 32, 0.5) !important; }
</style>
</head>
<body class="dark:bg-midnight font-display text-ivory">

<!-- Header -->
<header class="border-b border-gold/10 p-6 sticky top-0 z-40 bg-midnight/80">
  <div class="max-w-3xl mx-auto flex justify-between items-center">
    <button onclick="history.back()" class="text-ivory/60 hover:text-gold text-sm">← Back</button>
    <h1 class="text-2xl font-bold text-gold">Secure Checkout</h1>
    <div class="w-20"></div>
  </div>
</header>

<!-- Main -->
<main class="max-w-3xl mx-auto p-6 py-12">

  <!-- Order Summary -->
  <section class="border border-gold/10 rounded-lg p-6 mb-8 bg-midnight">
    <h2 class="text-lg font-bold text-gold mb-6">Order Summary</h2>

    <div id="product-info" class="space-y-3 border-b border-gold/10 pb-6 mb-6">
      <div class="flex justify-between">
        <div>
          <p id="product-name" class="font-bold text-ivory">Product</p>
          <p id="product-desc" class="text-ivory/60 text-sm">Description</p>
        </div>
        <p id="product-price" class="font-bold text-gold">$0.00</p>
      </div>
    </div>

    <div class="space-y-2">
      <div class="flex justify-between text-ivory/60">
        <span>Subtotal</span>
        <span id="subtotal">$0.00</span>
      </div>
      <div class="flex justify-between text-lg font-bold text-gold pt-2 border-t border-gold/10">
        <span>Total</span>
        <span id="total">$0.00</span>
      </div>
    </div>

    <!-- Digital Product Notice -->
    <div class="mt-6 p-4 bg-signature-teal/5 border border-signature-teal/20 rounded text-signature-teal text-sm">
      ✓ Digital product - Instant delivery to your email
    </div>
  </section>

  <!-- Payment Section -->
  <section class="border border-gold/10 rounded-lg p-6 bg-midnight">
    <h2 class="text-lg font-bold text-gold mb-6">Payment</h2>
    <div id="payment-container"></div>
  </section>

</main>

<!-- Footer -->
<footer class="w-full bg-midnight py-12 border-t border-gold/10">
  <div class="max-w-[960px] mx-auto flex flex-col items-center gap-6">
    <span style="color:#1FE6D1;font-size:0.75rem;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;">Follow Us</span>
    <div style="display:flex;gap:28px;align-items:center;">
      <a href="https://www.tiktok.com/@afwealthsystems" target="_blank" rel="noopener" style="color:#D7B46A;font-size:22px;"><i class="fa-brands fa-tiktok"></i></a>
      <a href="https://www.youtube.com/@afwealthmindset" target="_blank" rel="noopener" style="color:#D7B46A;font-size:22px;"><i class="fa-brands fa-youtube"></i></a>
      <a href="https://www.instagram.com/afwealthmindset/" target="_blank" rel="noopener" style="color:#D7B46A;font-size:22px;"><i class="fa-brands fa-instagram"></i></a>
      <a href="https://www.facebook.com/AFWealthMidnset" target="_blank" rel="noopener" style="color:#D7B46A;font-size:22px;"><i class="fa-brands fa-facebook"></i></a>
      <a href="https://x.com/AFWealth67" target="_blank" rel="noopener" style="color:#D7B46A;font-size:22px;"><i class="fa-brands fa-x-twitter"></i></a>
    </div>
    <div style="display:flex;gap:24px;">
      <a href="/pricing.html" style="color:rgba(246,241,231,0.3);font-size:0.75rem;text-decoration:none;">Pricing</a>
      <a href="/terms.html" style="color:rgba(246,241,231,0.3);font-size:0.75rem;text-decoration:none;">Terms</a>
      <a href="/privacy.html" style="color:rgba(246,241,231,0.3);font-size:0.75rem;text-decoration:none;">Privacy</a>
      <a href="/refund.html" style="color:rgba(246,241,231,0.3);font-size:0.75rem;text-decoration:none;">Refunds</a>
      <a href="/contact.html" style="color:rgba(246,241,231,0.3);font-size:0.75rem;text-decoration:none;">Contact</a>
    </div>
    <p class="text-ivory/30 text-xs tracking-widest uppercase">&copy; 2025 AF Wealth Mindset. All Rights Reserved.</p>
  </div>
</footer>

<script src="js/app.js"></script>
<script>
// ============================================================
// Products
// ============================================================

const PRODUCTS = {
  1: { id: 1, name: "Money Control Masterclass", desc: "Complete financial planning course", price: 97.00 },
  2: { id: 2, name: "Budget Planner", desc: "Digital budget planning tool", price: 9.99 },
  3: { id: 3, name: "Debt Payoff Strategy", desc: "Personalized debt elimination plan", price: 9.99 },
  4: { id: 4, name: "Investment 101", desc: "Beginner investment guide", price: 9.99 },
  5: { id: 5, name: "Savings Blueprint", desc: "30-day savings challenge", price: 9.99 },
  6: { id: 6, name: "Financial Goals Tracker", desc: "Monthly tracking spreadsheet", price: 9.99 },
  7: { id: 7, name: "Wealth Building Guide", desc: "Complete wealth creation blueprint", price: 9.99 }
};

let product = null;

// ============================================================
// Initialize
// ============================================================

function init() {
  const id = parseInt(new URLSearchParams(window.location.search).get('id')) || 1;
  product = PRODUCTS[id];

  if (!product) {
    window.location.href = '/pricing.html';
    return;
  }

  document.getElementById('product-name').textContent = product.name;
  document.getElementById('product-desc').textContent = product.desc;
  document.getElementById('product-price').textContent = '$' + product.price.toFixed(2);
  document.getElementById('subtotal').textContent = '$' + product.price.toFixed(2);
  document.getElementById('total').textContent = '$' + product.price.toFixed(2);
}

window.addEventListener('load', init);
</script>
</body>
</html>
