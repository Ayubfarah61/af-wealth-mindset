<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Checkout | AF Wealth Mindset</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: { 
      extend: { 
        colors: { 
          "midnight": "#0B1220", 
          "ivory": "#F6F1E7", 
          "gold": "#D7B46A", 
          "signature-teal": "#1FE6D1"
        }, 
        fontFamily: { 
          "display": ["Manrope", "sans-serif"] 
        } 
      } 
    }
  }
</script>
<style>
  body { background: #0B1220; }
</style>
</head>
<body class="dark:bg-midnight font-display text-ivory">

<!-- Header -->
<header class="border-b border-gold/10 p-6 sticky top-0 z-40 bg-midnight/80">
  <div class="max-w-2xl mx-auto flex justify-between items-center">
    <button onclick="history.back()" class="text-ivory/60 hover:text-gold">← Back</button>
    <h1 class="text-2xl font-bold text-gold">Checkout</h1>
    <div class="w-16"></div>
  </div>
</header>

<!-- Main -->
<main class="max-w-2xl mx-auto p-6 py-12">

  <!-- Order Summary -->
  <section class="border border-gold/10 rounded-lg p-6 mb-8 bg-midnight">
    <h2 class="text-lg font-bold text-gold mb-6">Order Summary</h2>
    <div id="product-display" class="space-y-4 border-b border-gold/10 pb-6">
      <!-- Filled by JS -->
    </div>
    <div class="mt-6 text-right">
      <p class="text-ivory/60 text-sm">Total:</p>
      <p id="total-price" class="text-3xl font-bold text-gold">$0.00</p>
    </div>
  </section>

</main>

<script>
// Products
const PRODUCTS = {
  1: { id: 1, name: "Money Control Masterclass", price: 97.00 },
  2: { id: 2, name: "Budget Planner", price: 9.99 },
  3: { id: 3, name: "Debt Payoff Strategy", price: 9.99 },
  4: { id: 4, name: "Investment 101", price: 9.99 },
  5: { id: 5, name: "Savings Blueprint", price: 9.99 },
  6: { id: 6, name: "Financial Goals Tracker", price: 9.99 },
  7: { id: 7, name: "Wealth Building Guide", price: 9.99 }
};

// Init
function init() {
  const id = parseInt(new URLSearchParams(window.location.search).get('id')) || 1;
  const product = PRODUCTS[id];
  if (!product) window.location.href = '/pricing.html';

  // Display product
  document.getElementById('product-display').innerHTML = `
    <div>
      <h3 class="font-bold text-ivory">${product.name}</h3>
      <p class="text-gold font-bold">$${product.price.toFixed(2)}</p>
    </div>
  `;
  document.getElementById('total-price').textContent = '$' + product.price.toFixed(2);
}

// Go
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>
</body>
</html>
