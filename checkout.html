<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Checkout | AF Wealth Mindset</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700&display=swap" rel="stylesheet"/>
<!-- PayPal SDK v6 -->
<script async src="https://www.sandbox.paypal.com/web-sdk/v6/core"></script>
<!-- EmailJS -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: { 
      extend: { 
        colors: { 
          "midnight": "#0B1220", 
          "ivory": "#F6F1E7", 
          "gold": "#D7B46A", 
          "signature-teal": "#1FE6D1"
        }, 
        fontFamily: { 
          "display": ["Manrope", "sans-serif"] 
        } 
      } 
    }
  }
</script>
<style>
  body { background: #0B1220; }
  input { background: #F6F1E7 !important; color: #0B1220 !important; padding: 10px 12px !important; }
  input::placeholder { color: rgba(11, 18, 32, 0.5) !important; }
</style>
</head>
<body class="dark:bg-midnight font-display text-ivory">

<!-- Loading -->
<div id="loading" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-midnight/80">
  <div class="text-center">
    <div class="w-10 h-10 border-4 border-signature-teal/30 border-t-signature-teal rounded-full animate-spin mx-auto mb-4"></div>
    <p class="text-ivory/60">Processing payment...</p>
  </div>
</div>

<!-- Header -->
<header class="border-b border-gold/10 p-6 sticky top-0 z-40 bg-midnight/80">
  <div class="max-w-3xl mx-auto flex justify-between items-center">
    <button onclick="history.back()" class="text-ivory/60 hover:text-gold text-sm">← Back</button>
    <h1 class="text-2xl font-bold text-gold">Secure Checkout</h1>
    <div class="w-20"></div>
  </div>
</header>

<!-- Main -->
<main class="max-w-3xl mx-auto p-6 py-12">

  <!-- Order Summary -->
  <section class="border border-gold/10 rounded-lg p-6 mb-8 bg-midnight">
    <h2 class="text-lg font-bold text-gold mb-6">Order Summary</h2>
    
    <div id="product-info" class="space-y-3 border-b border-gold/10 pb-6 mb-6">
      <div class="flex justify-between">
        <div>
          <p id="product-name" class="font-bold text-ivory">Product</p>
          <p id="product-desc" class="text-ivory/60 text-sm">Description</p>
        </div>
        <p id="product-price" class="font-bold text-gold">$0.00</p>
      </div>
    </div>

    <div class="space-y-2">
      <div class="flex justify-between text-ivory/60">
        <span>Subtotal</span>
        <span id="subtotal">$0.00</span>
      </div>
      <div class="flex justify-between text-ivory/60">
        <span>Tax (10%)</span>
        <span id="tax">$0.00</span>
      </div>
      <div class="flex justify-between text-lg font-bold text-gold pt-2 border-t border-gold/10">
        <span>Total</span>
        <span id="total">$0.00</span>
      </div>
    </div>

    <!-- Digital Product Notice -->
    <div class="mt-6 p-4 bg-signature-teal/5 border border-signature-teal/20 rounded text-signature-teal text-sm">
      ✓ Digital product - Instant delivery to your email
    </div>
  </section>

  <!-- Email -->
  <section class="border border-gold/10 rounded-lg p-6 mb-8 bg-midnight">
    <label class="block text-gold font-bold mb-3">Email Address</label>
    <input type="email" id="email" placeholder="your@email.com" required/>
    <p class="text-ivory/50 text-xs mt-2">Your download link will be sent here</p>
  </section>

  <!-- Payment -->
  <section class="border border-gold/10 rounded-lg p-6 bg-midnight">
    <h2 class="text-lg font-bold text-gold mb-6">Payment Method</h2>
    
    <div id="paypal-buttons-container">
      <!-- PayPal buttons appear here -->
    </div>

    <p id="error-msg" class="hidden text-red-400 text-sm mt-4 p-3 bg-red-900/10 rounded border border-red-400/20"></p>
  </section>

</main>

<script src="js/app.js"></script>
<script>
// ============================================================
// Products
// ============================================================

const PRODUCTS = {
  1: { id: 1, name: "Money Control Masterclass", desc: "Complete financial planning course", price: 97.00 },
  2: { id: 2, name: "Budget Planner", desc: "Digital budget planning tool", price: 9.99 },
  3: { id: 3, name: "Debt Payoff Strategy", desc: "Personalized debt elimination plan", price: 9.99 },
  4: { id: 4, name: "Investment 101", desc: "Beginner investment guide", price: 9.99 },
  5: { id: 5, name: "Savings Blueprint", desc: "30-day savings challenge", price: 9.99 },
  6: { id: 6, name: "Financial Goals Tracker", desc: "Monthly tracking spreadsheet", price: 9.99 },
  7: { id: 7, name: "Wealth Building Guide", desc: "Complete wealth creation blueprint", price: 9.99 }
};

const PAYPAL_CLIENT_ID = 'AURFqW9BM7AQJBnTjmCKCcMuKKN-fxthcmfY7U5kuAHq1ttVmTwozQ3dtfcqnwg2Vu3yI8OydJAhJ9Z7';
const WORKER_URL = 'https://afwm-paypal-api.ayubfarah67.workers.dev';

let product = null;

// ============================================================
// Initialize
// ============================================================

function init() {
  // Get product from URL
  const id = parseInt(new URLSearchParams(window.location.search).get('id')) || 1;
  product = PRODUCTS[id];
  
  if (!product) {
    window.location.href = '/pricing.html';
    return;
  }

  // Display product info
  document.getElementById('product-name').textContent = product.name;
  document.getElementById('product-desc').textContent = product.desc;
  document.getElementById('product-price').textContent = '$' + product.price.toFixed(2);
  document.getElementById('subtotal').textContent = '$' + product.price.toFixed(2);
  
  const tax = product.price * 0.10;
  const total = product.price + tax;
  
  document.getElementById('tax').textContent = '$' + tax.toFixed(2);
  document.getElementById('total').textContent = '$' + total.toFixed(2);

  // Initialize EmailJS
  emailjs.init('ylGXXn8CD-YXxPyFm');

  // Setup PayPal
  setupPayPal();
}

// ============================================================
// PayPal Setup
// ============================================================

async function setupPayPal() {
  try {
    // Create SDK instance
    const sdkInstance = await window.paypal.createInstance({
      clientId: PAYPAL_CLIENT_ID,
      components: ['buttons'],
      pageType: 'checkout'
    });

    console.log('✓ PayPal SDK loaded');

    // Create payment session
    const session = sdkInstance.createPayPalOneTimePaymentSession({
      async onApprove(data) {
        showLoading();
        try {
          // Capture order
          const res = await fetch(
            `${WORKER_URL}/paypal-api/checkout/orders/${data.orderId}/capture`,
            { method: 'POST' }
          );

          if (!res.ok) throw new Error('Capture failed');
          const result = await res.json();

          // Save order
          addOrder(product.id, result.amount, 'paypal', result.capture_id);

          // Send email
          await emailjs.send('service_046t8c7', 'template_wpxuynk', {
            to_email: document.getElementById('email').value,
            product_name: product.name,
            download_link: `https://afwealthmindset.com/downloads/${product.id}`
          });

          hideLoading();
          window.location.href = '/orders.html?success=1';
        } catch (err) {
          hideLoading();
          showError('Payment failed: ' + err.message);
          console.error(err);
        }
      },

      onCancel() {
        showError('Payment cancelled');
      },

      onError(err) {
        showError('Payment error: ' + err.message);
        console.error(err);
      }
    });

    // Render PayPal button
    const paypalButton = sdkInstance.createPayPalPaymentButtons({
      async createOrder() {
        const email = document.getElementById('email').value;
        if (!email) {
          showError('Please enter your email');
          return null;
        }

        showLoading();
        try {
          const res = await fetch(`${WORKER_URL}/paypal-api/checkout/orders/create`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              amount: product.price.toFixed(2),
              email: email,
              description: product.name
            })
          });

          if (!res.ok) throw new Error('Order creation failed');
          const data = await res.json();
          hideLoading();
          return data.id;
        } catch (err) {
          hideLoading();
          showError('Failed to create order: ' + err.message);
          console.error(err);
          return null;
        }
      }
    });

    await paypalButton.render('#paypal-buttons-container');
    console.log('✓ PayPal button rendered');

  } catch (err) {
    console.error('PayPal setup error:', err);
    showError('Payment system error');
  }
}

// ============================================================
// Utilities
// ============================================================

function showLoading() {
  document.getElementById('loading').classList.remove('hidden');
}

function hideLoading() {
  document.getElementById('loading').classList.add('hidden');
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.classList.remove('hidden');
}

// ============================================================
// Run
// ============================================================

window.addEventListener('load', init);
</script>
</body>
</html>
