<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Product | AF Wealth Mindset</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: { extend: { colors: { "midnight": "#0B1220", "ivory": "#F6F1E7", "gold": "#D7B46A", "signature-teal": "#1FE6D1", "background-dark": "#0B1220" }, fontFamily: { "display": ["Manrope", "sans-serif"] }, borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" } } }
  }
</script>
</head>
<body class="dark:bg-background-dark font-display text-ivory antialiased">
<div class="relative flex min-h-screen flex-col overflow-x-hidden">

<!-- Header -->
<header class="sticky top-0 z-50 flex items-center justify-between px-6 py-4 bg-midnight/80 backdrop-blur-md border-b border-gold/10 lg:px-40">
  <div class="flex-1">
    <button onclick="history.back()" class="flex items-center gap-2 text-ivory/60 hover:text-gold transition-colors text-sm">
      <span class="material-symbols-outlined text-sm">arrow_back_ios</span> Back
    </button>
  </div>
  <nav class="flex items-center gap-10">
    <a id="nav-auth-link" href="/signup.html" class="text-ivory hover:text-gold transition-colors text-sm font-medium tracking-wide">Sign Up</a>
    <a href="/#about" class="text-ivory hover:text-gold transition-colors text-sm font-medium tracking-wide">About</a>
  </nav>
  <div class="flex flex-1 justify-end gap-4">
    <button onclick="window.location.href='/orders.html'" class="flex items-center justify-center w-10 h-10 rounded-lg hover:bg-gold/10 text-gold transition-all">
      <span class="material-symbols-outlined">shopping_cart</span>
    </button>
  </div>
</header>

<main class="flex-1 w-full max-w-[640px] mx-auto px-6 py-12">
  <!-- Hero Image -->
  <div class="w-full mt-6 mb-8">
    <div id="hero-img" class="w-full h-48 lg:h-64 rounded-xl overflow-hidden bg-center bg-cover border border-gold/10"></div>
  </div>

  <!-- Title & Description -->
  <div class="text-center mb-10">
    <h1 id="product-title" class="text-4xl font-extrabold text-gold uppercase tracking-[0.1em] mb-4"></h1>
    <p id="product-desc" class="text-lg text-ivory/70 leading-relaxed max-w-xl mx-auto"></p>
  </div>

  <!-- CTA Button -->
  <div class="mb-12">
    <button id="buy-btn" class="w-full py-5 bg-signature-teal hover:brightness-110 text-midnight rounded-xl font-bold text-lg shadow-lg shadow-signature-teal/20 transition-all flex items-center justify-center gap-2">
      <span class="material-symbols-outlined">download</span>
      <span id="buy-btn-text">Get Access Now</span>
    </button>
  </div>

  <!-- What's Included -->
  <div class="mb-12">
    <h3 class="text-center text-gold font-bold uppercase tracking-widest text-sm mb-6">What's Included</h3>
    <div id="features-list" class="space-y-4"></div>
  </div>

  <!-- Feature Blocks -->
  <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-16">
    <div class="p-6 text-center rounded-2xl bg-midnight border border-gold/10">
      <span class="material-symbols-outlined text-gold text-4xl mb-3">bolt</span>
      <h4 class="font-bold text-ivory">Instant Download</h4>
      <p class="text-sm text-ivory/50 mt-2">Immediate access to your digital vault after checkout.</p>
    </div>
    <div class="p-6 text-center rounded-2xl bg-midnight border border-gold/10">
      <span class="material-symbols-outlined text-gold text-4xl mb-3">history</span>
      <h4 class="font-bold text-ivory">Lifetime Access</h4>
      <p class="text-sm text-ivory/50 mt-2">Your purchase is yours forever. No recurring fees.</p>
    </div>
  </div>

  <!-- Footer -->
  <footer class="w-full bg-midnight py-12 border-t border-gold/10 mt-12 -mx-6 px-6">
    <div class="flex flex-col items-center gap-6">
      <span class="text-signature-teal text-xs font-bold tracking-[0.2em] uppercase">Follow Us</span>
      <div class="flex justify-center gap-8">
        <a class="text-gold hover:text-signature-teal transition-colors" href="#" title="TikTok"><span class="material-symbols-outlined text-2xl">tiktok</span></a>
        <a class="text-gold hover:text-signature-teal transition-colors" href="#" title="YouTube"><span class="material-symbols-outlined text-2xl">play_circle</span></a>
        <a class="text-gold hover:text-signature-teal transition-colors" href="#" title="Instagram"><span class="material-symbols-outlined text-2xl">photo_camera</span></a>
        <a class="text-gold hover:text-signature-teal transition-colors" href="#" title="Facebook"><span class="material-symbols-outlined text-2xl">facebook</span></a>
        <a class="text-gold hover:text-signature-teal transition-colors" href="#" title="X"><span class="material-symbols-outlined text-2xl">close</span></a>
      </div>
      <p class="text-ivory/30 text-xs tracking-widest uppercase">© 2024 AF Wealth Mindset. All Rights Reserved.</p>
    </div>
  </footer>
</main>
</div>

<script src="/js/app.js"></script>
<script>
  initHeader();
  const product = getProductFromURL();

  document.title = product.name + ' | AF Wealth Mindset';
  document.getElementById('hero-img').style.backgroundImage = `url('${product.heroImage}')`;
  document.getElementById('product-title').textContent = product.name;
  document.getElementById('product-desc').textContent = product.description;
  document.getElementById('buy-btn-text').textContent = `Get Access Now - $${product.price}`;

  document.getElementById('buy-btn').onclick = function() {
    window.location.href = '/checkout.html?id=' + product.id;
  };

  const featuresList = document.getElementById('features-list');
  product.features.forEach(f => {
    featuresList.innerHTML += `
    <div class="flex items-center gap-4 p-4 rounded-xl border border-gold/10 bg-midnight">
      <div class="w-10 h-10 rounded-full bg-gold/10 flex items-center justify-center text-gold flex-shrink-0">
        <span class="material-symbols-outlined">${f.icon}</span>
      </div>
      <div class="flex-1">
        <h4 class="font-bold text-ivory">${f.title}</h4>
        <p class="text-sm text-ivory/50">${f.desc}</p>
      </div>
    </div>`;
  });
</script>
</body>
</html>
