<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0a111e", // Midnight Navy approximation
                        "accent-teal": "#1FE6D1", // Signature Teal
                        "accent-gold": "#D7B46A", // Champagne Gold
                        "ivory": "#F6F1E7",
                        "background-light": "#f6f7f8",
                        "background-dark": "#0B1220", // The requested Midnight Navy
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Manrope', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .custom-card-border {
            border: 1px solid rgba(215, 180, 106, 0.15); /* Subtle Gold border */
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-ivory min-h-screen flex flex-col font-display">
<!-- Header Section -->
<header class="w-full border-b border-white/10 px-6 py-4">
<div class="max-w-[1200px] mx-auto flex items-center justify-between">
<div class="flex-1"></div> <!-- Spacer -->
<nav class="flex items-center gap-10">
<a class="text-ivory/80 hover:text-accent-teal text-sm font-medium transition-colors uppercase tracking-widest" href="#">Sign Up</a>
<a class="text-ivory/80 hover:text-accent-teal text-sm font-medium transition-colors uppercase tracking-widest" href="#">About</a>
</nav>
<div class="flex flex-1 justify-end gap-5">
<button class="text-ivory/80 hover:text-accent-teal transition-colors">
<span class="material-symbols-outlined">favorite</span>
</button>
<button class="text-ivory/80 hover:text-accent-teal transition-colors">
<span class="material-symbols-outlined">shopping_cart</span>
</button>
</div>
</div>
</header>
<!-- Main Content: Link-in-bio Column -->
<main class="flex-grow flex flex-col items-center px-4 py-12">
<div class="w-full max-w-md flex flex-col items-center">
<!-- Profile Section -->
<div class="flex flex-col items-center mb-10 text-center">
<div class="w-28 h-28 rounded-full bg-gradient-to-tr from-accent-teal/20 to-accent-gold/20 p-1 mb-4">
<div class="w-full h-full rounded-full bg-cover bg-center border-2 border-background-dark" data-alt="Minimalist circular user profile avatar placeholder" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuD05TqOOol-QW-B4Bz82HCMPW1FhCJu35_Rxi9B1CucyVqd3bRXblwiWor9cuZRkbbxTNIF3gnxoh2DVo-HceuxcL4G3RRUPV8O2bz6gsRvTfs03JeUKW_Q8VB-rQzkgZKS48kUJ6lBJBJi-WtHo3gZaZRZFGWK1-9ajqmS5lAsl4s9L41BO5FxrrZGkhIs4LiMmZg3piDJcoU6y53D_vmg9SKZq2yon3MBRcL5OCj1WYG2_FknBjVL9dwXlCii8CH25nKDlvvA8lk')">
</div>
</div>
<h1 class="text-ivory text-2xl font-bold tracking-tight">Alex Sterling</h1>
<p class="text-accent-gold text-sm font-medium mt-1">@alex_creative</p>
</div>
<!-- Social Icons Section -->
<!-- Action Cards -->
<div class="w-full space-y-4">
<!-- My Orders -->
<a class="group flex items-center justify-between w-full p-5 bg-white/5 custom-card-border rounded-xl hover:bg-white/10 transition-all duration-300" href="#">
<div class="flex items-center gap-4">
<div class="flex items-center justify-center w-10 h-10 rounded-lg bg-accent-gold/10">
<span class="material-symbols-outlined text-accent-gold">package_2</span>
</div>
<span class="text-ivory font-semibold text-lg">My Orders</span>
</div>
<span class="material-symbols-outlined text-accent-teal group-hover:translate-x-1 transition-transform">arrow_forward_ios</span>
</a>
<!-- Account Settings -->
<a class="group flex items-center justify-between w-full p-5 bg-white/5 custom-card-border rounded-xl hover:bg-white/10 transition-all duration-300" href="#">
<div class="flex items-center gap-4">
<div class="flex items-center justify-center w-10 h-10 rounded-lg bg-accent-gold/10">
<span class="material-symbols-outlined text-accent-gold">settings</span>
</div>
<span class="text-ivory font-semibold text-lg">Account Settings</span>
</div>
<span class="material-symbols-outlined text-accent-teal group-hover:translate-x-1 transition-transform">arrow_forward_ios</span>
</a>
</div>
<!-- Sign Out Button -->
<div class="w-full mt-16">
<button class="w-full py-4 rounded-xl border border-white/10 text-ivory/40 hover:text-accent-teal hover:border-accent-teal/50 font-medium transition-all duration-300 tracking-widest uppercase text-xs">
                    Sign Out
                </button>
</div>
</div>
</main>
<!-- Footer -->
<footer class="w-full py-8 border-t border-white/5">
<div class="max-w-[1200px] mx-auto text-center">
<div class="flex flex-col items-center gap-6">
<span class="text-accent-teal text-xs font-bold tracking-[0.2em] uppercase">Follow Us</span>
<div class="flex justify-center gap-8">
<a class="text-accent-gold hover:text-accent-teal transition-colors" href="#" title="TikTok">
<span class="material-symbols-outlined text-2xl">tiktok</span>
</a>
<a class="text-accent-gold hover:text-accent-teal transition-colors" href="#" title="YouTube">
<span class="material-symbols-outlined text-2xl">play_circle</span>
</a>
<a class="text-accent-gold hover:text-accent-teal transition-colors" href="#" title="Instagram">
<span class="material-symbols-outlined text-2xl">photo_camera</span>
</a>
<a class="text-accent-gold hover:text-accent-teal transition-colors" href="#" title="Facebook">
<span class="material-symbols-outlined text-2xl">facebook</span>
</a>
<a class="text-accent-gold hover:text-accent-teal transition-colors" href="#" title="X">
<span class="material-symbols-outlined text-2xl">close</span>
</a>
</div>
</div>
</div>
</footer>
</body></html>
